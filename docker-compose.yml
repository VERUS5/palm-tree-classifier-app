services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: palm
      POSTGRES_PASSWORD: palm_secure_password_change_me
      POSTGRES_DB: palmclassifier
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palm -d palmclassifier"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://palm:palm_secure_password_change_me@db:5432/palmclassifier
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_to_a_random_string}
      NODE_ENV: production
      PORT: "5000"
      INFERENCE_PORT: "5001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/backend/models:ro

volumes:
  pgdata:
